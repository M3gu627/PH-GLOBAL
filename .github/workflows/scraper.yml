name: DFA Slot Scraper

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10        # Was 20 — each batch only handles ~11 sites
    strategy:
      fail-fast: false          # If one batch fails, others keep running
      matrix:
        batch_index: [0, 1, 2, 3]   # 4 parallel jobs

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests google-auth playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper (batch ${{ matrix.batch_index }})
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FCM_SERVICE_ACCOUNT: ${{ secrets.FCM_SERVICE_ACCOUNT }}
          BATCH_INDEX: ${{ matrix.batch_index }}
          BATCH_TOTAL: "4"
        run: python scraper/dfa_scraper.py