name: ph_global
description: "PH Notify"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_native_splash: ^2.4.3
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.0
  supabase_flutter: ^2.15.0
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/applogo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/applogo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "assets/applogo.png"